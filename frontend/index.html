<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ========== DYNAMIC SEO META TAGS (with sub‑brand images) ========== -->
    <script>
      (function () {
        const hostname = window.location.hostname;
        const isMainDomain =
          hostname === "lovohcreate.com" ||
          hostname === "www.lovohcreate.com";

        let title, description, url, type, ogImage;
        const base = "https://lovohcreate.com";

        if (isMainDomain) {
          title = "LovohCreate | Brand Marketing, Tech & Events";
          description =
            "LovohCreate helps brands grow with smart marketing, custom web & app development, a bustling marketplace (Uduua), an insightful magazine (Biizzed), and easy event creation. Explore now.";
          url = base;
          type = "website";
          ogImage = base + "/logo.png";
        } else if (hostname === "uduua.lovohcreate.com") {
          title = "Uduua – Fast‑Growing Brands Marketplace | LovohCreate";
          description =
            "Uduua by LovohCreate is your destination for quality products at retail & bulk prices. Shop, sell, or advertise – built for everyday buyers and ambitious sellers.";
          url = "https://uduua.lovohcreate.com";
          type = "website";
          ogImage = base + "/uduua.png";         // ← Uduua sub‑brand image
        } else if (hostname === "biizzed.lovohcreate.com") {
          title = "Biizzed – Business & Culture Magazine | LovohCreate";
          description =
            "Biizzed brings you articles, magazines, and videos spotlighting founders, leaders, and cultural innovators. A LovohCreate brand.";
          url = "https://biizzed.lovohcreate.com";
          type = "website";
          ogImage = base + "/biizzed.png";       // ← Biizzed sub‑brand image
        } else if (hostname === "eventroom.lovohcreate.com") {
          title = "EventRoom – Create & Sell Tickets to Events | LovohCreate";
          description =
            "EventRoom by LovohCreate lets you create, promote, and sell tickets to any event. Keep 94% of every sale. Secure & automated.";
          url = "https://eventroom.lovohcreate.com";
          type = "website";
          ogImage = base + "/eventroom.png";          // ← EventRoom sub‑brand image
        } else {
          // fallback
          title = "LovohCreate – Brand Marketing & Tech";
          description =
            "LovohCreate offers brand marketing, web/app development, e‑commerce, and event management. A place where brands come alive.";
          url = base;
          type = "website";
          ogImage = base + "/logo.png";
        }

        // Prevent double rendering on client-side navigation
        if (!document.getElementById("seo-meta-tags")) {
          const fragment = document.createDocumentFragment();

          const titleTag = document.createElement("title");
          titleTag.textContent = title;
          fragment.appendChild(titleTag);

          const metaDesc = document.createElement("meta");
          metaDesc.name = "description";
          metaDesc.content = description;
          fragment.appendChild(metaDesc);

          // Open Graph
          const ogTitle = document.createElement("meta");
          ogTitle.property = "og:title";
          ogTitle.content = title;
          fragment.appendChild(ogTitle);

          const ogDesc = document.createElement("meta");
          ogDesc.property = "og:description";
          ogDesc.content = description;
          fragment.appendChild(ogDesc);

          const ogUrl = document.createElement("meta");
          ogUrl.property = "og:url";
          ogUrl.content = url;
          fragment.appendChild(ogUrl);

          const ogType = document.createElement("meta");
          ogType.property = "og:type";
          ogType.content = type;
          fragment.appendChild(ogType);

          const ogImageMeta = document.createElement("meta");
          ogImageMeta.property = "og:image";
          ogImageMeta.content = ogImage;
          fragment.appendChild(ogImageMeta);

          const ogSite = document.createElement("meta");
          ogSite.property = "og:site_name";
          ogSite.content = "LovohCreate";
          fragment.appendChild(ogSite);

          // Twitter Card
          const twitterCard = document.createElement("meta");
          twitterCard.name = "twitter:card";
          twitterCard.content = "summary_large_image";
          fragment.appendChild(twitterCard);

          const twitterTitle = document.createElement("meta");
          twitterTitle.name = "twitter:title";
          twitterTitle.content = title;
          fragment.appendChild(twitterTitle);

          const twitterDesc = document.createElement("meta");
          twitterDesc.name = "twitter:description";
          twitterDesc.content = description;
          fragment.appendChild(twitterDesc);

          const twitterImage = document.createElement("meta");
          twitterImage.name = "twitter:image";
          twitterImage.content = ogImage;
          fragment.appendChild(twitterImage);

          const wrapper = document.createElement("span");
          wrapper.id = "seo-meta-tags";
          wrapper.style.display = "none";
          wrapper.appendChild(fragment);

          document.head.prepend(wrapper);
        }
      })();
    </script>
    <!-- ========== END DYNAMIC SEO META TAGS ========== -->

    <!-- ==================== SUBDOMAIN-AWARE PWA META TAGS ==================== -->
    <script>
      (function () {
        const hostname = window.location.hostname;

        if (hostname === "uduua.lovohcreate.com") {
          document.write(`
            <link rel="manifest" href="/manifest-uduua.json" />
            <meta name="theme-color" content="#0043FC" />
            <meta name="apple-mobile-web-app-title" content="Uduua" />
            <link rel="apple-touch-icon" href="/uduua-icon.png" />
          `);
        } else if (hostname === "biizzed.lovohcreate.com") {
          document.write(`
            <link rel="manifest" href="/manifest.json" />
            <meta name="theme-color" content="#1B3766" />
            <meta name="apple-mobile-web-app-title" content="Biizzed" />
            <link rel="apple-touch-icon" href="/7.png" />
          `);
        } else if (hostname === "eventroom.lovohcreate.com") {
          document.write(`
            <link rel="manifest" href="/manifest-events.json" />
            <meta name="theme-color" content="#1B3766" />
            <meta name="apple-mobile-web-app-title" content="EventRoom" />
            <link rel="apple-touch-icon" href="/event-icon.png" />
          `);
        }
      })();
    </script>
    <!-- ==================== END PWA META TAGS ==================== -->

    <!-- Canonical URL to avoid duplicates -->
    <script>
      (function () {
        const hostname = window.location.hostname;
        let canonical;
        if (hostname === "lovohcreate.com" || hostname === "www.lovohcreate.com") {
          canonical = "https://lovohcreate.com";
        } else if (hostname === "uduua.lovohcreate.com") {
          canonical = "https://uduua.lovohcreate.com";
        } else if (hostname === "biizzed.lovohcreate.com") {
          canonical = "https://biizzed.lovohcreate.com";
        } else if (hostname === "eventroom.lovohcreate.com") {
          canonical = "https://eventroom.lovohcreate.com";
        }
        if (canonical) {
          const link = document.createElement("link");
          link.rel = "canonical";
          link.href = canonical + window.location.pathname + window.location.search;
          document.head.appendChild(link);
        }
      })();
    </script>

    <!-- ==================== SUBDOMAIN URL CLEANUP ==================== -->
    <script>
      (function () {
        const hostname = window.location.hostname;
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;

        let cleanPath = null;

        if (
          hostname === "biizzed.lovohcreate.com" &&
          path.startsWith("/biizzed/")
        ) {
          cleanPath = path.replace("/biizzed/", "/") + search + hash;
        } else if (
          hostname === "uduua.lovohcreate.com" &&
          path.startsWith("/uduua/")
        ) {
          cleanPath = path.replace("/uduua/", "/") + search + hash;
        } else if (
          hostname === "eventroom.lovohcreate.com" &&
          path.startsWith("/events/")
        ) {
          cleanPath = path.replace("/events/", "/") + search + hash;
        }

        if (cleanPath) {
          window.location.replace(cleanPath);
        }
      })();
    </script>
    <!-- ==================== END URL CLEANUP ==================== -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
