<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ==================== PWA Meta Tags ==================== -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1B3766" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bizzzed" />
    <link rel="apple-touch-icon" href="/7.png" />
    <!-- ==================== END PWA Meta Tags ==================== -->
    
    <title>LovoCreate</title>
    
    <!-- ==================== SUBDOMAIN URL CLEANUP (runs before everything) ==================== -->
    <script>
      (function() {
        const hostname = window.location.hostname;
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        
        let cleanPath = null;
        
        if (hostname === 'biizzed.lovohcreate.com' && path.startsWith('/biizzed/')) {
          cleanPath = path.replace('/biizzed/', '/') + search + hash;
        } else if (hostname === 'uduua.lovohcreate.com' && path.startsWith('/uduua/')) {
          cleanPath = path.replace('/uduua/', '/') + search + hash;
        } else if (hostname === 'event-room.lovohcreate.com' && path.startsWith('/events/')) {
          cleanPath = path.replace('/events/', '/') + search + hash;
        }
        
        if (cleanPath) {
          window.location.replace(cleanPath);
        }
      })();
    </script>
    <!-- ==================== END URL CLEANUP ==================== -->
    
    <!-- ==================== LOADING OVERLAY (prevents not-found flash) ==================== -->
    <style>
      #loading-overlay {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.3s ease;
      }
      #loading-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #1B3766;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <!-- ==================== END LOADING OVERLAY ==================== -->
  </head>
  <body>
    <!-- Loading overlay covers everything until React removes it -->
    <div id="loading-overlay">
      <div class="loader-spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
